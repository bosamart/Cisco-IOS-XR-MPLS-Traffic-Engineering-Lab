<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
  <!-- canvas -->
  <rect x="0" y="0" width="960" height="560" rx="14" fill="#ffffff"/>
  <rect x="0.5" y="0.5" width="959" height="559" rx="14" fill="none" stroke="#E2E8F0"/>

  <text x="480" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0F172A">MPLS-TE Lab — Diamond Topology (Cisco IOS XRv9000)</text>
  <text x="480" y="54" text-anchor="middle" font-size="12" fill="#64748B">IS-IS L2 core · two equal-cost paths R1→R4 · cross-link makes TE meaningful</text>

  <!-- ===================== LINKS (drawn first, nodes cover ends) ===================== -->
  <!-- CE access links -->
  <line x1="121" y1="280" x2="207" y2="280" stroke="#475569" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="753" y1="280" x2="839" y2="280" stroke="#475569" stroke-width="2.5" stroke-linecap="round"/>

  <!-- GOLD north path: R1-R2 and R2-R4 -->
  <line x1="250" y1="280" x2="490" y2="130" stroke="#C8901C" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="490" y1="130" x2="730" y2="280" stroke="#C8901C" stroke-width="4.5" stroke-linecap="round"/>

  <!-- BRONZE south path: R1-R3 and R3-R4 -->
  <line x1="250" y1="280" x2="490" y2="430" stroke="#A0613A" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="490" y1="430" x2="730" y2="280" stroke="#A0613A" stroke-width="4.5" stroke-linecap="round"/>

  <!-- cross-link (uncolored) -->
  <line x1="490" y1="130" x2="490" y2="430" stroke="#94A3B8" stroke-width="3" stroke-dasharray="7 5" stroke-linecap="round"/>

  <!-- ===================== SUBNET LABELS ===================== -->
  <g font-size="11" fill="#0F172A" font-weight="600" text-anchor="middle">
    <text x="164" y="240" font-size="10">192.168.11.0/30</text>
    <text x="796" y="240" font-size="10">192.168.44.0/30</text>
    <!-- gold -->
    <rect x="300" y="192" width="74" height="16" rx="3" fill="#ffffff"/>
    <text x="337" y="204" fill="#8A6212">10.12.0.0/30</text>
    <rect x="606" y="192" width="74" height="16" rx="3" fill="#ffffff"/>
    <text x="643" y="204" fill="#8A6212">10.24.0.0/30</text>
    <!-- bronze -->
    <rect x="300" y="352" width="74" height="16" rx="3" fill="#ffffff"/>
    <text x="337" y="364" fill="#7A4326">10.13.0.0/30</text>
    <rect x="606" y="352" width="74" height="16" rx="3" fill="#ffffff"/>
    <text x="643" y="364" fill="#7A4326">10.34.0.0/30</text>
    <!-- cross -->
    <rect x="498" y="272" width="74" height="16" rx="3" fill="#ffffff"/>
    <text x="535" y="284" fill="#475569">10.23.0.0/30</text>
  </g>

  <!-- ===================== INTERFACE LABELS ===================== -->
  <g font-size="9" fill="#64748B" text-anchor="middle">
    <!-- R1 -->
    <text x="196" y="272">Gi0</text>
    <text x="300" y="240">Gi1</text>
    <text x="300" y="326">Gi3</text>
    <!-- R2 -->
    <text x="452" y="158">Gi0</text>
    <text x="504" y="172">Gi1</text>
    <text x="536" y="158">Gi3</text>
    <!-- R3 -->
    <text x="504" y="394">Gi0</text>
    <text x="452" y="408">Gi2</text>
    <text x="536" y="408">Gi4</text>
    <!-- R4 -->
    <text x="688" y="240">Gi2</text>
    <text x="688" y="326">Gi3</text>
    <text x="784" y="272">Gi1</text>
    <!-- CEs -->
    <text x="132" y="272">Gi1</text>
    <text x="828" y="272">Gi0</text>
  </g>

  <!-- ===================== NODES ===================== -->
  <!-- CE1 -->
  <g>
    <rect x="35" y="252" width="86" height="56" rx="9" fill="#F1F5F9" stroke="#64748B" stroke-width="1.5"/>
    <text x="78" y="273" text-anchor="middle" font-size="15" font-weight="700" fill="#0F172A">CE1</text>
    <text x="78" y="288" text-anchor="middle" font-size="9" fill="#475569">AS 65001</text>
    <text x="78" y="300" text-anchor="middle" font-size="9" fill="#475569">11.11.11.11</text>
  </g>
  <!-- CE2 -->
  <g>
    <rect x="839" y="252" width="86" height="56" rx="9" fill="#F1F5F9" stroke="#64748B" stroke-width="1.5"/>
    <text x="882" y="273" text-anchor="middle" font-size="15" font-weight="700" fill="#0F172A">CE2</text>
    <text x="882" y="288" text-anchor="middle" font-size="9" fill="#475569">AS 65002</text>
    <text x="882" y="300" text-anchor="middle" font-size="9" fill="#475569">22.22.22.22</text>
  </g>
  <!-- R1 PE -->
  <g>
    <rect x="207" y="251" width="86" height="58" rx="9" fill="#DCE9FF" stroke="#2563EB" stroke-width="1.8"/>
    <text x="250" y="274" text-anchor="middle" font-size="16" font-weight="700" fill="#0F172A">R1</text>
    <text x="250" y="289" text-anchor="middle" font-size="10" font-weight="600" fill="#2563EB">PE</text>
    <text x="250" y="302" text-anchor="middle" font-size="9" fill="#475569">1.1.1.1</text>
  </g>
  <!-- R4 PE -->
  <g>
    <rect x="687" y="251" width="86" height="58" rx="9" fill="#DCE9FF" stroke="#2563EB" stroke-width="1.8"/>
    <text x="730" y="274" text-anchor="middle" font-size="16" font-weight="700" fill="#0F172A">R4</text>
    <text x="730" y="289" text-anchor="middle" font-size="10" font-weight="600" fill="#2563EB">PE</text>
    <text x="730" y="302" text-anchor="middle" font-size="9" fill="#475569">4.4.4.4</text>
  </g>
  <!-- R2 P -->
  <g>
    <rect x="447" y="101" width="86" height="58" rx="9" fill="#ECE3FF" stroke="#7C3AED" stroke-width="1.8"/>
    <text x="490" y="124" text-anchor="middle" font-size="16" font-weight="700" fill="#0F172A">R2</text>
    <text x="490" y="139" text-anchor="middle" font-size="10" font-weight="600" fill="#7C3AED">P</text>
    <text x="490" y="152" text-anchor="middle" font-size="9" fill="#475569">2.2.2.2</text>
  </g>
  <!-- R3 P -->
  <g>
    <rect x="447" y="401" width="86" height="58" rx="9" fill="#ECE3FF" stroke="#7C3AED" stroke-width="1.8"/>
    <text x="490" y="424" text-anchor="middle" font-size="16" font-weight="700" fill="#0F172A">R3</text>
    <text x="490" y="439" text-anchor="middle" font-size="10" font-weight="600" fill="#7C3AED">P</text>
    <text x="490" y="452" text-anchor="middle" font-size="9" fill="#475569">3.3.3.3</text>
  </g>

  <!-- ===================== LEGEND ===================== -->
  <g font-size="11" fill="#334155">
    <rect x="40" y="500" width="880" height="44" rx="8" fill="#F8FAFC" stroke="#E2E8F0"/>
    <line x1="60" y1="515" x2="92" y2="515" stroke="#C8901C" stroke-width="4.5" stroke-linecap="round"/>
    <text x="100" y="519">GOLD links → north path (R1–R2–R4)</text>
    <line x1="330" y1="515" x2="362" y2="515" stroke="#A0613A" stroke-width="4.5" stroke-linecap="round"/>
    <text x="370" y="519">BRONZE links → south path (R1–R3–R4)</text>
    <line x1="620" y1="515" x2="652" y2="515" stroke="#94A3B8" stroke-width="3" stroke-dasharray="7 5" stroke-linecap="round"/>
    <text x="660" y="519">cross-link (uncolored)</text>
    <text x="60" y="537" font-size="10" fill="#64748B">Phase 7 affinity coloring · GiX = GigabitEthernet0/0/0/X · lower-numbered router = .1 on each /30 · L3VPN: VRF CUST-A, RD/RT 100:1</text>
  </g>
</svg>
